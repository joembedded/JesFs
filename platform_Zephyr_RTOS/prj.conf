# -----------------------------------------------------------------------------
# JoEmbedded Basis build configuration
#
# Diese Datei ist die Basiskonfiguration (primaere prj.conf).
# Sie stellt im wesentlichen den MAIN-Rahmen und die Toolbox tb_xxxx bereit.
# Zusaetzliche Features spaeter ueber EXTRA_CONF_FILE aus Unterverzeichnissen
# einbinden (siehe jodocs/struktur.md).

# -----------------------------------------------------------------------------
# DEBUG-BUILD (gut sichtbar)
# Aktiviert Debug-Informationen fuer besseres Source-Level-Debugging.
# Hinweis: Das reduziert Optimierungen und kann Flash/RAM-Bedarf erhoehen.
# Bei Nicht-Bedarf/Release einfach ein '#' vor die Zeilen setzen.
# -----------------------------------------------------------------------------
# CONFIG_DEBUG_OPTIMIZATIONS=y
# CONFIG_DEBUG_THREAD_INFO=y

# -----------------------------------------------------------------------------
# Logging / UART
# UART braucht ca. 160uA, wenn aktiviert.
# Nur wenn Logging gebraucht: CONFIG_LOG=y
# -----------------------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# -----------------------------------------------------------------------------
# Floating Point
# -----------------------------------------------------------------------------
# Floating Point Unit immer sinnvoll 
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# -----------------------------------------------------------------------------
# Power Management
# -----------------------------------------------------------------------------
# Aktiviert die Power-Management-API für Hardware-Geräte.
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
# Aktiviert Runtime-PM standardmäßig für alle Treiber, die es unterstützen.
CONFIG_PM_DEVICE_RUNTIME_DEFAULT_ENABLE=y

# -----------------------------------------------------------------------------
# Hardware ID / Reboot
# -----------------------------------------------------------------------------
# Fuer einfache MAC noetig: HWINFO (die Library selbst wird hier nicht gebraucht)
CONFIG_HWINFO=y
CONFIG_REBOOT=y

# -----------------------------------------------------------------------------
# Memory
# -----------------------------------------------------------------------------
# CONFIG_MAIN_STACK_SIZE war vorher kleiner (4k),
# aus Vorsicht etwas groesser, damit lokale Puffer (250 Bytes) sicher sind.
CONFIG_MAIN_STACK_SIZE=6144
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# -----------------------------------------------------------------------------
# MODULES
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# MODULE BLuetooth UART
# -----------------------------------------------------------------------------
CONFIG_BLUETOOTH_UART=n


# -----------------------------------------------------------------------------
# MODULE JesFs with Shell
# -----------------------------------------------------------------------------
CONFIG_JESFS_SHELL=y

CONFIG_FLASH=y
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_CRC=y
# On MX25R6435F:65k and 4k pages possible, JesFs needs 4k page size
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

# Optional aktivieren wenn Flash aktiv gescannt werden soll (SFDP-Daten)
CONFIG_FLASH_JESD216_API=y
CONFIG_SPI_NOR_SFDP_RUNTIME=y





